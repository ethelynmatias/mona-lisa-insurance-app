services:
  app:
    image: ${DOCKERHUB_USERNAME}/mona-lisa-insurance:latest
    container_name: mona-lisa-app
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "5173:5173"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-mona_lisa_insurance}
      - DB_USERNAME=${DB_USERNAME:-sail}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - /var/www/mona-lisa-insurance-app/.env:/var/www/.env
      - storage-data:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mona-lisa-network

  mysql:
    image: mysql:8.0
    container_name: mona-lisa-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mona_lisa_insurance}
      MYSQL_USER: ${DB_USERNAME:-sail}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mona-lisa-network

volumes:
  mysql-data:
    driver: local
  storage-data:
    driver: local

networks:
  mona-lisa-network:
    driver: bridge
